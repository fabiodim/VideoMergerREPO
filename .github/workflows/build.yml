name: Build Windows EXE with Nuitka

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install moviepy customtkinter nuitka

    - name: Build EXE with Nuitka
      run: |
        python -m nuitka --standalone --onefile --plugin-enable=tk-inter --windows-console-mode=disable --assume-yes-for-downloads app.py

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: Video-Merger-Nuitka-Windows
        path: app.exe
